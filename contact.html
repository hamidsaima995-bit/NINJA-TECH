  <div class="section" style="border-top:none;">
    <h2 style="font-size:38px;">Get In Touch</h2>
    <p>Have a project in mind or want to collaborate? Send a message and I'll get back to you.</p>
  </div>

  <!-- To receive emails: make a free form at https://formspree.io,
       then replace YOUR_ID below with your form ID. -->
  <form class="form" action="https://formspree.io/f/YOUR_ID" method="POST">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Ali Khan" required />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required />

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>

    <button type="submit" class="btn">Send Message</button>
  </form>

  <footer>
    <span>© 2026 Ninja Tech — Saima</span>
