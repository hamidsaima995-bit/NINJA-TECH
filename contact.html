<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Ninja Tech</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="logo"><span class="dot"></span>Ninja Tech</a>
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
      <a href="team.html">Team</a>
    </div>
  </nav>

  <section class="section">
    <span class="eyebrow">// Say hello</span>
    <h2>Let's <span class="grad">talk</span>.</h2>
    <p class="lead">Have a project in mind or want to collaborate? Send a message and I'll get back to you — usually the same day.</p>

    <form class="form" id="contactForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Ali Khan" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>

      <button type="submit" class="btn btn-primary">Send Message →</button>
    </form>

    <p class="lead" style="margin-top:20px;font-size:.9em;opacity:.75">
      Prefer email? <a href="mailto:hamidsaima995@gmail.com">hamidsaima995@gmail.com</a>
    </p>
  </section>

  <footer>
    <span>© 2026 Ninja Tech — Saima</span>
    <span><a href="https://github.com/hamidsaima995-bit" target="_blank" rel="noopener">GitHub ↗</a></span>
  </footer>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();

  var name    = document.getElementById('name').value.trim();
  var email   = document.getElementById('email').value.trim();
  var message = document.getElementById('message').value.trim();

  if(!name || !email || !message) return;

  var text =
    'Hello Ninja Tech,\n\n' +
    'Name: '  + name  + '\n' +
    'Email: ' + email + '\n\n' +
    message;

  window.open('https://wa.me/923210014466?text=' + encodeURIComponent(text), '_blank');
});
</script>

</body>
</html>
